<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Paint the most. Outlast the rest." />
  <meta name="application-name" content="Battle Painter" />
  <meta name="theme-color" content="#0a0b10" />
  <meta name="apple-mobile-web-app-title" content="Battle Painter" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta property="og:title" content="Battle Painter" />
  <meta property="og:description" content="Paint the most. Outlast the rest." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/assets/og-battle-painter.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1024" />
  <meta property="og:image:height" content="1024" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Battle Painter" />
  <meta name="twitter:description" content="Paint the most. Outlast the rest." />
  <meta name="twitter:image" content="/assets/og-battle-painter.png" />
  <title>Battle Painter</title>
  <link rel="icon" type="image/svg+xml" href="/assets/icon-brush.svg?v=5" />
  <link rel="icon" href="/favicon.ico?v=5" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=5" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=5" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=4" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="stage">

    <!-- Ranking bar: block element in flow; settings (left), ranks split around timer -->
    <div id="topbar">
      <button id="settings-btn" class="icon-btn" type="button" aria-label="Settings" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
      <div id="rank-left" class="rank-group"></div>
      <div id="timer">
        <span class="eb-bg"></span>
        <span class="eb-glow-2"></span>
        <span class="eb-glow-1"></span>
        <span class="eb-base"></span>
        <span class="eb-main"></span>
        <span class="timer-val">2:00</span>
      </div>
      <div id="rank-right" class="rank-group"></div>
      <span class="topbar-spacer"></span>
    </div>

    <!-- Full-viewport canvas overlay: play area is rendered below the bar, but
         brush sprites are drawn unclipped so their tips can poke over the bar.
         pointer-events:none so the bar/settings underneath stay clickable. -->
    <canvas id="game" width="1280" height="720"></canvas>

    <!-- Pre-round 3-2-1 countdown. The server freezes everyone during it, so the
         whole field is released together for a fair start. -->
    <div id="countdown" aria-hidden="true"></div>

    <!-- Settings dropdown (anchored under the gear; expandable over time) -->
    <div id="settings-menu" class="hidden">
      <div class="settings-title">Settings</div>
      <div class="settings-row">
        <span>Sound</span>
        <button id="sound-toggle-ingame" class="settings-btn-sm" type="button">On</button>
      </div>
      <div class="settings-row">
        <span>Countdown</span>
        <button id="countdown-toggle" class="settings-btn-sm" type="button">On</button>
      </div>
      <label class="settings-row">
        <span>Master</span>
        <input id="vol-slider" type="range" min="0" max="100" value="70" />
      </label>
      <label class="settings-row">
        <span>Music</span>
        <input id="music-slider" type="range" min="0" max="100" value="100" />
      </label>
      <label class="settings-row">
        <span>Effects</span>
        <input id="sfx-slider" type="range" min="0" max="100" value="100" />
      </label>
    </div>

    <!-- Spectator banner -->
    <div id="spectate" class="overlay hidden">
      <div class="card">
        <div class="big">SPECTATING</div>
        <div class="sub">Joining next round…</div>
      </div>
    </div>

    <!-- Round-over results -->
    <div id="results" class="overlay hidden">
      <canvas id="results-confetti" aria-hidden="true"></canvas>
      <div id="round-end-card" class="round-end-card">
        <div id="result-kicker" class="result-kicker">Round over</div>
        <div id="result-title" class="big">ROUND OVER</div>
        <div id="result-list"></div>
        <div class="result-footer">
          <div class="sub">Next round in <span id="next-countdown">10</span>s</div>
          <button id="results-menu-btn" class="btn btn-ghost" type="button">Leave to menu</button>
        </div>
      </div>
    </div>

    <!-- Landing-only bottom bar: brand + stats (left), name/Play + menu (right).
         The client-side game runs clean, full-bleed behind it -- nothing is overlaid
         on it. Shown via body.in-menu; hidden in a match. -->
    <nav id="bottom-nav" aria-label="Menu">
      <div class="nav-left">
        <div class="brand">
          <img class="brand-mark" src="/assets/logo-battle-painter.svg" alt="Battle Painter" width="84" height="56" decoding="async" />
        </div>
        <!-- Stats pill relocated out of the bar; re-add <div id="stats" class="stats"></div>
             wherever it should live (renderStats() targets #stats; .stats styles are portable). -->
      </div>
      <form id="start-form" class="start-form" autocomplete="off">
        <input id="name-input" class="input" type="text" maxlength="16" placeholder="Enter name (optional)" spellcheck="false" aria-label="Player name" />
        <button id="play-btn" class="btn btn-primary play-btn" type="submit">
          <svg class="nav-icon nav-icon-play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 5.2v13.6L18.6 12 8 5.2z"></path></svg>
          <span>Play</span>
        </button>
      </form>
      <div class="nav-actions">
        <a class="nav-btn nav-link" href="https://x.com/type_kshitij" target="_blank" rel="noopener">
          <svg class="nav-icon nav-icon-x" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M14.6 10.4 22 2h-1.8l-6.4 7.3L8.6 2H2.7l7.8 11.1L2.7 22h1.8l6.8-7.7 5.5 7.7h5.9l-8.1-11.6zm-2.4 2.7-.8-1.1L5.1 3.3h2.6l5.1 7.1.8 1.1 6.6 9.2h-2.6l-5.4-7.6z"></path></svg>
          <span>@type_kshitij</span>
        </a>
        <button id="nav-settings" class="nav-btn nav-icon-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Settings">
          <svg class="nav-icon nav-icon-gear" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1A2 2 0 1 1 7 4.4l.1.1a1.6 1.6 0 0 0 1.8.3h.1a1.6 1.6 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 1 1.5h.1a1.6 1.6 0 0 0 1.8-.3l.1-.1A2 2 0 1 1 19.8 7l-.1.1a1.6 1.6 0 0 0-.3 1.8v.1a1.6 1.6 0 0 0 1.5 1h.1a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"></path></svg>
        </button>
      </div>
    </nav>

  </div>

  <!-- Animated turbulence filter for the timer's electric border -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <filter id="eb-displace" color-interpolation-filters="sRGB" x="-50%" y="-50%" width="200%" height="200%">
        <feTurbulence type="turbulence" baseFrequency="0.018 0.045" numOctaves="6" result="n1" seed="3" />
        <feOffset in="n1" result="o1"><animate attributeName="dy" values="180; 0" dur="3.6s" repeatCount="indefinite" calcMode="linear" /></feOffset>
        <feTurbulence type="turbulence" baseFrequency="0.018 0.045" numOctaves="6" result="n2" seed="3" />
        <feOffset in="n2" result="o2"><animate attributeName="dy" values="0; -180" dur="3.6s" repeatCount="indefinite" calcMode="linear" /></feOffset>
        <feTurbulence type="turbulence" baseFrequency="0.018 0.045" numOctaves="6" result="n3" seed="7" />
        <feOffset in="n3" result="o3"><animate attributeName="dx" values="150; 0" dur="3.6s" repeatCount="indefinite" calcMode="linear" /></feOffset>
        <feTurbulence type="turbulence" baseFrequency="0.018 0.045" numOctaves="6" result="n4" seed="7" />
        <feOffset in="n4" result="o4"><animate attributeName="dx" values="0; -150" dur="3.6s" repeatCount="indefinite" calcMode="linear" /></feOffset>
        <feComposite in="o1" in2="o2" result="p1" />
        <feComposite in="o3" in2="o4" result="p2" />
        <feBlend in="p1" in2="p2" mode="color-dodge" result="comb" />
        <feDisplacementMap in="SourceGraphic" in2="comb" scale="9" xChannelSelector="R" yChannelSelector="B" />
      </filter>
    </defs>
  </svg>

  <script src="/js/client-config.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/audio.js"></script>
  <script src="/client.js"></script>
</body>
</html>
